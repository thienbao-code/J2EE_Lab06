<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
</head>
<body>
<h1>Add Product</h1>

<form th:action="@{/product/add}" th:object="${product}" method="post">
    <div>
        <label for="name">Product name</label>
        <input id="name" type="text" th:field="*{name}" required />
    </div>
    <br />
    <div>
        <label for="price">Price</label>
        <input id="price" type="number" step="0.01" min="0" th:field="*{price}" required />
    </div>
    <br />
    <div>
        <label for="description">Description</label>
        <textarea id="description" th:field="*{description}" rows="4" cols="40"></textarea>
    </div>
    <br />
    <button type="submit">Add</button>
</form>

<p><a href="/products">Back to products</a></p>
</body>
</html>
